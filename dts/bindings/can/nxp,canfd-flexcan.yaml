description: NXP CANFD FlexCAN controller

compatible: "nxp,canfd-flexcan"

include:
    - name: can-fd-controller.yaml
    - name: pinctrl-device.yaml

properties:
    reg:
      required: true

    interrupts:
      required: true

    clocks:
      required: true

    clk-source:
      type: int
      required: true
      description: CAN engine clock source

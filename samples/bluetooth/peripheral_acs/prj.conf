CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_SMP_APP_PAIRING_ACCEPT=y

# Services
CONFIG_BT_CTS=y
CONFIG_BT_HRS=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=n
CONFIG_BT_ACS=y
CONFIG_BT_ACS_DESCRIPTORS=y
CONFIG_BT_ACS_ATT_MTU=y
# Security feature levels — explicit so cipher overlays can reliably override them
CONFIG_BT_ACS_FEAT_AUTHENTICATION=y
CONFIG_BT_ACS_FEAT_INTEGRITY=y
CONFIG_BT_ACS_FEAT_CONFIDENTIALITY=y
# GCM is the ACS spec baseline cipher (§4.1.1.2); redundant with Kconfig default but kept explicit
CONFIG_BT_ACS_DATA_PROTECTION_AES_GCM=y
CONFIG_BT_ACS_PROTECTED_RESOURCE_NOTIFICATION=y
CONFIG_BT_ACS_PROTECTED_RESOURCE_INDICATION=y
CONFIG_BT_ACS_MULTIPLE_RESTRICTION_MAPS=y
CONFIG_BT_ACS_RESOURCE_HANDLE_UUID_MAP=y
CONFIG_BT_ACS_INITIATE_PAIRING=y

# Key exchange methods — all three enabled; overlays restrict to a single method
CONFIG_BT_ACS_KEY_EXCHANGE_ECDH=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y

CONFIG_BT_ACS_KEY_EXCHANGE_KDF=y

CONFIG_BT_ACS_CONFIRMATION_OUTPUT_NUMERIC=y
CONFIG_BT_ACS_CONFIRMATION_OUTPUT_MAX_VALUE=1

# HKDF + SHA-256: needed for ECDH confirmation HMAC and KDF session derivation
CONFIG_PSA_WANT_ALG_HKDF=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_ALG_SHA_256=y

# AES-GCM for data protection (§4.1.1.2 mandates GCM as baseline)
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_GCM=y


# Settings persistence for ACS session keys
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y


# GATT authorization — ACS auto-registers its callback to enforce protection
CONFIG_BT_GATT_AUTHORIZATION_CUSTOM=y
CONFIG_BT_ACS_GATT_AUTHORIZATION=y

CONFIG_BT_DEVICE_NAME="ACS CTS HRS Demo"
CONFIG_BT_DEVICE_APPEARANCE=256
CONFIG_BT_ACS_LOG_LEVEL_DBG=y
CONFIG_STACK_SENTINEL=y
CONFIG_BT_RX_STACK_SIZE=8192

# Main thread needs extra stack for: bt_acs_init() -> bt_acs_rmap_resolve_handles() ->
# acs_rhandle_find_char_handle() -> bt_gatt_foreach_attr() callback chain
# + LOG_DBG format machinery. Default 1024 is too small.
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y

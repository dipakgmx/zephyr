# overlay-security-switch.conf -- enable Set Security Controls Switch
#
# Exposes the Set Security Controls Switch opcode on the ACS CP.
# When the switch is turned off, all security controls are bypassed
# and protected resources become directly accessible.
#
# Apply on top of prj.conf:
#   west build -b <board> -- -DEXTRA_CONF_FILE=overlay-security-switch.conf
CONFIG_BT_ACS_SET_SECURITY_CONTROLS_SWITCH=y

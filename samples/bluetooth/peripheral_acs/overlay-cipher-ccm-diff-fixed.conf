# AES-128-CCM with SEQ_DIFF_FIXED nonce scheme
#
# Replaces the default AES-GCM with AES-128-CCM (AEAD, §3.6) using the
# differential fixed-part nonce scheme (Table 4.47).  Server and client
# each have an 8-byte fixed nonce prefix; the remaining 5 bytes are a
# sequential counter.  Requires the SET_CLIENT_NONCE_FIXED procedure
# (opcode 0x23) before the first encrypted message can be sent.
#
# CCM uses a 13-byte nonce; GCM/GMAC use 12-byte.  Cannot coexist in
# the same build.
#
# PTS tests exercised (combine with a kex overlay):
#   ACS/SR/ACSCP/BV-33-C  Set AC Client Nonce Fixed
#   ACS/SR/ACSCP/BI-09-C  Set AC Client Nonce Fixed — Invalid Operand 1
#   ACS/SR/ACSCP/BI-10-C  Set AC Client Nonce Fixed — Invalid Operand 2
#   ACS/SR/ACSCP/BI-11-C  Set AC Client Nonce Fixed — Invalid Operand 3
#   ACS/SR/GEH/BI-08-C    Invalid Nonce with SEQ_DIFF_FIXED

# Disable the default GCM (incompatible 12-byte nonce)
CONFIG_BT_ACS_DATA_PROTECTION_AES_GCM=n

CONFIG_BT_ACS_DATA_PROTECTION_AES_CCM=y
CONFIG_BT_ACS_CCM_NONCE_SEQ_DIFF_FIXED=y
CONFIG_BT_ACS_CCM_NONCE_FIXED_SIZE=8
CONFIG_BT_ACS_CCM_MAC_SIZE=8
CONFIG_PSA_WANT_ALG_CCM=y

# AES-128-CCM — confidentiality only (§3.6.6.1)
#
# Table row 4: Confidentiality without explicit integrity feature.
# ISC controls: Nonce + MAC + Authenticated And Encrypted.
#
# CCM is an AEAD cipher (always produces auth tag), but this overlay
# advertises only the CONFIDENTIALITY feature, not INTEGRITY.
# GMAC is not pulled in (its Kconfig default depends on INTEGRITY).
# Uses even/odd nonce scheme (no Set Client Nonce Fixed required).
#
# Combine with a kex overlay (e.g., overlay-kex-ecdh.conf).

# Disable the default GCM; PSA deps are auto-selected via Kconfig
CONFIG_BT_ACS_DATA_PROTECTION_AES_GCM=n

CONFIG_BT_ACS_FEAT_INTEGRITY=n
CONFIG_BT_ACS_DATA_PROTECTION_AES_CCM=y
CONFIG_BT_ACS_CCM_NONCE_SEQ_EVEN_ODD=y
CONFIG_BT_ACS_CCM_MAC_SIZE=8

# overlay-bonding.conf — enable ACS session persistence and pairing initiation
#
# Apply on top of prj.conf:
#   west build -b <board> -- -DEXTRA_CONF_FILE=overlay-bonding.conf
#
# With this overlay:
#  - ACS session keys are stored in NVS and restored automatically when a
#    bonded peer reconnects (no key exchange needed on reconnect).
#  - The ACS CP exposes the INITIATE_PAIRING opcode (0xDF) so the client
#    can trigger BLE bonding via the ACS control point after key exchange.

# Expose INITIATE_PAIRING opcode on the ACS Control Point so the client
# can trigger the BLE SMP pairing procedure via ACS.
CONFIG_BT_ACS_INITIATE_PAIRING=y


# Allow more than one bonded peer so that a fresh PTS connection can get a
# key slot even when a previous bond already occupies the default slot.
# Without this, bt_keys_get_addr() returns NULL → -ENOMEM from smp_send_security_req.
CONFIG_BT_MAX_PAIRED=4

# AES-128-GMAC — authentication + integrity, nonce-based plaintext (§3.6.6.3)
#
# Table row 3: Authentication + integrity with nonce-based plaintext.
# ISC controls: Nonce + Authenticated + MAC (data is NOT encrypted).
#
# GMAC is GCM with zero-length plaintext: produces an authentication tag
# over the data without encrypting it.  Uses a 12-octet IV with sequence
# nonce for anti-replay protection.
#
# §4.1.1.2: mandatory when the AC Server advertises integrity and
# authentication but NOT confidentiality.
#
# PSA deps (PSA_WANT_ALG_GCM, PSA_WANT_KEY_TYPE_AES) are auto-selected
# by the Kconfig 'select' on BT_ACS_DATA_PROTECTION_AES_GMAC.

CONFIG_BT_ACS_FEAT_CONFIDENTIALITY=n
CONFIG_BT_ACS_DATA_PROTECTION_AES_GMAC=y

# AES-128-GMAC — integrity + authentication, no confidentiality (§3.6, §4.1.1.2)
#
# GMAC is GCM with zero-length plaintext: produces an authentication tag
# over the associated data only.  Data is authenticated but NOT encrypted.
#
# §4.1.1.2: mandatory when the AC Server advertises integrity and
# authentication but NOT confidentiality.
#
# This overlay disables CONFIDENTIALITY; INTEGRITY stays enabled (default y).
# PSA_WANT_ALG_GCM stays — GMAC is GCM with empty plaintext internally.

CONFIG_BT_ACS_FEAT_CONFIDENTIALITY=n
CONFIG_BT_ACS_DATA_PROTECTION_AES_GMAC=y
CONFIG_PSA_WANT_ALG_GCM=y

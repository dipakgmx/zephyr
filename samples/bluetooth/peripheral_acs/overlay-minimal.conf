# overlay-minimal.conf -- minimal ACS configuration
#
# Single cipher (GCM) + single KEX (ECDH P-256).  Disables all optional
# features to produce the smallest possible ACS build.
#
# Apply on top of prj.conf:
#   west build -b <board> -- -DEXTRA_CONF_FILE=overlay-minimal.conf

# Restrict to ECDH only
CONFIG_BT_ACS_KEY_EXCHANGE_KDF=n
CONFIG_BT_ACS_KEY_EXCHANGE_OOB=n

# Disable optional CP procedures
CONFIG_BT_ACS_MULTIPLE_RESTRICTION_MAPS=n
CONFIG_BT_ACS_RESOURCE_HANDLE_UUID_MAP=n
CONFIG_BT_ACS_INITIATE_PAIRING=n
CONFIG_BT_ACS_ATT_MTU=n

# Disable session persistence
CONFIG_BT_SETTINGS=n
CONFIG_SETTINGS=n
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_NVS=n

# Reduce stack (no persistence overhead)
CONFIG_BT_RX_STACK_SIZE=4096

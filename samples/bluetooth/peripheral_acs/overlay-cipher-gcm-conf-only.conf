# AES-128-GCM — confidentiality only (§3.6.6.3)
#
# Table row 4: Confidentiality without explicit integrity feature.
# ISC controls: Nonce + MAC + Authenticated And Encrypted.
#
# GCM is an AEAD cipher (always produces auth tag), but this overlay
# advertises only the CONFIDENTIALITY feature, not INTEGRITY.
# GMAC is not pulled in (its Kconfig default depends on INTEGRITY).
#
# Combine with a kex overlay (e.g., overlay-kex-ecdh.conf).

CONFIG_BT_ACS_FEAT_INTEGRITY=n

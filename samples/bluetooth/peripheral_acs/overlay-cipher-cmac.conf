# AES-128-CMAC — authentication only (§3.6)
#
# CMAC provides a message authentication code without encryption.
# Used when the AC Server advertises authentication only (no integrity
# or confidentiality bits set).
#
# This overlay disables INTEGRITY and CONFIDENTIALITY.
# Data is authenticated (MAC tag appended) but NOT encrypted.

# Disable GCM (prj.conf default) — CMAC depends on !GCM
CONFIG_BT_ACS_DATA_PROTECTION_AES_GCM=n
CONFIG_BT_ACS_FEAT_CONFIDENTIALITY=n
CONFIG_BT_ACS_FEAT_INTEGRITY=n
CONFIG_BT_ACS_DATA_PROTECTION_AES_CMAC=y
CONFIG_PSA_WANT_ALG_CMAC=y

# AES-128-CMAC — authentication + integrity, plaintext payload (§3.6.5)
#
# Table row 2: Authentication + integrity with plaintext payload.
# ISC controls: MAC (data is NOT encrypted, no nonce for anti-replay).
#
# CMAC provides a message authentication code without encryption or
# nonce-based replay protection.  Data is authenticated (MAC tag
# appended) but NOT encrypted.
#
# INTEGRITY and CONFIDENTIALITY are disabled; AUTHENTICATION stays enabled.
# PSA deps (PSA_WANT_ALG_CMAC, PSA_WANT_KEY_TYPE_AES) are auto-selected
# by the Kconfig 'select' on BT_ACS_DATA_PROTECTION_AES_CMAC.

CONFIG_BT_ACS_DATA_PROTECTION_AES_GCM=n
CONFIG_BT_ACS_FEAT_CONFIDENTIALITY=n
CONFIG_BT_ACS_FEAT_INTEGRITY=n
CONFIG_BT_ACS_DATA_PROTECTION_AES_CMAC=y
